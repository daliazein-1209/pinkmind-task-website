<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Mind - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="logo">Pink Mind</div>
        <div class="title">Admin Dashboard</div>
        <a href="/" class="nav-btn">Home</a>
    </header>

    <div class="table-container" style="padding: 50px 20px; max-width: 1300px; margin: 0 auto;">
        <h2 style="margin-bottom: 25px; font-family: 'Poppins', sans-serif; color: #333;">All Submitted Tasks</h2>
        
        <table style="width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-radius: 8px; overflow: hidden; font-family: 'Poppins', sans-serif;">
            <thead>
                <tr style="background: linear-gradient(to right, #e8a2bd, #cf9ed6); color: black; text-align: left;">
                    <th style="padding: 18px 15px;">Student Name</th>
                    <th style="padding: 18px 15px;">Group</th>
                    <th style="padding: 18px 15px;">Task Title</th>
                    <th style="padding: 18px 15px;">Notes</th>
                    <th style="padding: 18px 15px;">File Name</th>
                    <th style="padding: 18px 15px;">Submitted At</th>
                </tr>
            </thead>
            <tbody>
                {% for sub in submissions %}
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 15px; font-weight: 600; color: #000;">{{ sub[0] }}</td>
                    <td style="padding: 15px; color: #333; font-weight: 500;">{{ sub[1] }}</td>
                    <td style="padding: 15px; color: #555;">{{ sub[2] }}</td>
                    <td style="padding: 15px; color: #777;">{{ sub[3] if sub[3] else '-' }}</td>
                    <td style="padding: 15px;">
                        <a href="{{ url_for('static', filename='uploads/' + sub[4]) }}" target="_blank" style="color: #b574ab; font-weight: 600; text-decoration: none;">
                            📄 {{ sub[4] }}
                        </a>
                    </td>
                    <td style="padding: 15px; color: #888; font-size: 0.9rem;">{{ sub[5] }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6" style="padding: 40px; text-align: center; color: #999;">No tasks submitted yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
